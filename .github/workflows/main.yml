name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - run: pip install PyQt6 PyQt6-WebEngine requests pyinstaller
    
    - run: |
        pyinstaller --name="MoviePlayer" --onefile --windowed `
          --add-data "core;core" --add-data "ui;ui" --add-data "utils;utils" `
          --hidden-import PyQt6.sip --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui --hidden-import PyQt6.QtWidgets `
          --hidden-import PyQt6.QtWebEngineWidgets --hidden-import requests `
          --clean --noconfirm run.py
    
    - uses: actions/upload-artifact@v4
      with:
        name: MoviePlayer-EXE
        path: dist/*.exe
