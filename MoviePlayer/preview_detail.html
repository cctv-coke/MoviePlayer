<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>影视详情 - 预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
        }
        .detail-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: transparent;
            border: none;
            color: #e94560;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .info-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .poster {
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, #1a1a4e, #0f3460);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .info {
            flex: 1;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .score {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .meta {
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .tag {
            display: inline-block;
            background: rgba(233, 69, 96, 0.15);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .desc {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .action-btns {
            display: flex;
            gap: 15px;
        }
        .btn-primary {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .source-tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #2a2a5e;
            margin-bottom: 20px;
        }
        .source-tab {
            padding: 10px 20px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
        }
        .source-tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        .episodes {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
        }
        .episode {
            background: #1a1a4e;
            border: 1px solid #2a2a5e;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .episode:hover {
            border-color: #e94560;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="back-btn">◀ 返回</div>
        
        <div class="info-section">
            <div class="poster">🎬</div>
            <div class="info">
                <div class="title">赎梦</div>
                <div class="score">⭐ 评分: 7.5</div>
                <div class="meta">类型: 剧情片 | 年份: 2024 | 地区: 香港</div>
                <div class="tag">HD国语版</div>
                <div class="desc">
                    📖 简介: 张家辉执导并主演的犯罪剧情片。讲述了一个关于救赎与梦想的故事，
                    展现了人性的复杂与挣扎。影片节奏紧凑，演技精湛，是一部值得一看的佳作...
                </div>
                <div class="action-btns">
                    <button class="btn-primary">▶ 立即播放</button>
                    <button class="btn-secondary">❤️ 收藏</button>
                </div>
            </div>
        </div>
        
        <div class="source-tabs">
            <div class="source-tab active">📡 非凡资源</div>
            <div class="source-tab">📡 ffm3u8</div>
        </div>
        
        <h3 style="margin-bottom: 15px;">📋 选集</h3>
        <div class="episodes">
            <div class="episode">国语版</div>
            <div class="episode">粤语版</div>
            <div class="episode">预告片</div>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 30px; color: #888;">
        <p>🎬 详情页预览 | 支持多线路切换</p>
    </div>
</body>
</html>
